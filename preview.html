<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Mindmap Preview</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; font-family: system-ui, sans-serif; background: #e8e8e8; color: #1a1a1a; }
    #viewport { position: fixed; inset: 0; cursor: grab; touch-action: none; }
    #viewport.grabbing { cursor: grabbing; }
    #world { position: absolute; width: 4000px; height: 4000px; transform-origin: 0 0; }
    #world svg { position: absolute; inset: 0; pointer-events: none; }
    .toolbar {
      position: fixed; top: 12px; left: 12px; z-index: 10;
      display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
      padding: 8px 12px; background: #fff; border: 1px solid #ccc; border-radius: 8px;
    }
    .toolbar button {
      padding: 6px 12px; border: 1px solid #bbb; border-radius: 6px;
      background: #f5f5f5; cursor: pointer; font-size: 13px;
    }
    .toolbar button.primary { background: #3685bf; color: #fff; border-color: #3685bf; }
    .hint { position: fixed; bottom: 12px; left: 12px; font-size: 12px; color: #666; background: #fff; padding: 4px 8px; border-radius: 6px; border: 1px solid #ddd; }
    .node { position: absolute; transform: translate(-50%, -50%); min-width: 200px; }
    .node-inner { background: #fff; border: 1px solid #ccc; border-radius: 8px; overflow: hidden; }
    .node.category .node-inner { background: #3685bf; border-color: #2e76ab; border-radius: 20px; }
    .drag-handle {
      padding: 6px 10px; font-size: 11px; color: #888; cursor: grab;
      border-bottom: 1px solid #eee; user-select: none;
    }
    .node.category .drag-handle { color: rgba(255,255,255,0.7); border-color: rgba(255,255,255,0.2); }
    .row { display: flex; align-items: center; gap: 8px; padding: 8px 10px; flex-wrap: wrap; }
    .node.category input { color: #fff; font-weight: 600; }
    input[type="text"], textarea {
      border: none; outline: none; font: inherit; flex: 1; min-width: 80px; background: transparent;
    }
    .priority { display: flex; gap: 3px; }
    .priority button {
      width: 10px; height: 10px; padding: 0; border: none; border-radius: 2px; cursor: pointer;
    }
    .notes { padding: 10px; border-top: 1px solid #eee; background: #fafafa; }
    .notes textarea { width: 100%; min-height: 60px; resize: vertical; }
    .notes img { max-width: 120px; max-height: 80px; border-radius: 4px; margin-top: 6px; }
    .icon-btn { width: 22px; height: 22px; border: none; background: #eee; border-radius: 4px; cursor: pointer; font-size: 12px; }
    .done { opacity: 0.55; text-decoration: line-through; }
  </style>
</head>
<body>
  <div class="toolbar">
    <strong>Task mindmap</strong>
    <button class="primary" id="addCat">Add category</button>
    <button class="primary" id="addTask" style="display:none">Add task</button>
    <button id="resetView">Reset view</button>
  </div>
  <p class="hint">Drag background to pan · drag ⋮⋮ handle to move nodes</p>
  <div id="viewport">
    <div id="world">
      <svg id="lines" width="4000" height="4000"></svg>
      <div id="nodes"></div>
    </div>
  </div>
  <script>
    const WORLD = 4000, CX = 2000, CY = 2000;
    const PRIORITY = ["#c04848", "#e8c030", "#1f8a65", "#8888a8"];
    let pan = { x: -1560, y: -1640 };
    let nodes = [
      { id: "cat-1", parentId: null, label: "Category 1", checked: false, priority: 3, notes: "", images: [], notesOpen: false, isCategory: true },
      { id: "task-1", parentId: "cat-1", label: "task 1", checked: false, priority: 0, notes: "", images: [], notesOpen: false, isCategory: false },
      { id: "task-2", parentId: "cat-1", label: "task list 2", checked: false, priority: 1, notes: "Related context and follow-ups go here.", images: [], notesOpen: true, isCategory: false },
    ];
    let positions = {
      "cat-1": { x: CX, y: CY },
      "task-1": { x: CX + 280, y: CY },
      "task-2": { x: CX - 280, y: CY },
    };
    let drag = null;
    const viewport = document.getElementById("viewport");
    const world = document.getElementById("world");
    const nodesEl = document.getElementById("nodes");
    const linesEl = document.getElementById("lines");

    function uid() { return "n-" + Date.now() + "-" + Math.random().toString(36).slice(2, 7); }
    function category() { return nodes.find(n => n.isCategory); }
    function applyTransform() { world.style.transform = `translate(${pan.x}px, ${pan.y}px)`; }
    function fillCount(p) { return p === 3 ? 1 : 3 - p; }

    function render() {
      const cat = category();
      document.getElementById("addCat").style.display = cat ? "none" : "";
      document.getElementById("addTask").style.display = cat ? "" : "none";
      linesEl.innerHTML = `<defs><pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse"><circle cx="1" cy="1" r="0.75" fill="#ccc"/></pattern></defs><rect width="100%" height="100%" fill="url(#dots)"/>`;
      if (cat) {
        const from = positions[cat.id];
        nodes.filter(n => n.parentId === cat.id).forEach(child => {
          const to = positions[child.id];
          if (from && to) {
            const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
            line.setAttribute("x1", from.x); line.setAttribute("y1", from.y);
            line.setAttribute("x2", to.x); line.setAttribute("y2", to.y);
            line.setAttribute("stroke", "#bbb"); line.setAttribute("stroke-width", "1.5");
            linesEl.appendChild(line);
          }
        });
      }
      nodesEl.innerHTML = "";
      nodes.forEach(node => {
        const pos = positions[node.id];
        if (!pos) return;
        const el = document.createElement("div");
        el.className = "node" + (node.isCategory ? " category" : "");
        el.style.left = pos.x + "px";
        el.style.top = pos.y + "px";
        const fc = fillCount(node.priority);
        const pc = PRIORITY[node.priority];
        el.innerHTML = `
          <div class="node-inner">
            <div class="drag-handle" data-drag="${node.id}">⋮⋮ ${node.isCategory ? "Category" : "Drag to move"}</div>
            <div class="row">
              ${node.isCategory ? "" : `<input type="checkbox" data-check="${node.id}" ${node.checked ? "checked" : ""}>`}
              <input type="text" data-label="${node.id}" value="${node.label.replace(/"/g, "&quot;")}" class="${node.checked ? "done" : ""}">
              ${node.isCategory ? "" : `<span class="priority">${[0,1,2,3].map(i => `<button data-pri="${node.id}" data-level="${i}" style="background:${i < fc ? pc : "transparent"};outline:1px solid ${PRIORITY[i]}"></button>`).join("")}</span>`}
              ${node.isCategory ? "" : `<button class="icon-btn" data-notes="${node.id}">${node.notesOpen ? "▾" : "▸"}</button><button class="icon-btn" data-del="${node.id}">✕</button>`}
            </div>
            ${!node.isCategory && node.notesOpen ? `<div class="notes" data-paste="${node.id}"><textarea data-notes-text="${node.id}" placeholder="Notes — paste images here">${node.notes}</textarea>${node.images.map((src,i) => `<img src="${src}">`).join("")}</div>` : ""}
          </div>`;
        nodesEl.appendChild(el);
      });
      applyTransform();
    }

    function startDrag(kind, e, nodeId) {
      if (e.button !== 0) return;
      e.stopPropagation();
      drag = { kind, pointerId: e.pointerId, sx: e.clientX, sy: e.clientY, panX: pan.x, panY: pan.y };
      if (kind === "node") {
        const p = positions[nodeId];
        drag.nodeId = nodeId; drag.nx = p.x; drag.ny = p.y;
      }
      viewport.classList.add("grabbing");
      e.target.setPointerCapture?.(e.pointerId);
    }

    viewport.addEventListener("pointerdown", e => {
      if (e.target.closest(".node")) return;
      startDrag("pan", e);
    });
    nodesEl.addEventListener("pointerdown", e => {
      const h = e.target.closest("[data-drag]");
      if (h) startDrag("node", e, h.dataset.drag);
    });
    window.addEventListener("pointermove", e => {
      if (!drag || e.pointerId !== drag.pointerId) return;
      const dx = e.clientX - drag.sx, dy = e.clientY - drag.sy;
      if (drag.kind === "pan") { pan.x = drag.panX + dx; pan.y = drag.panY + dy; applyTransform(); }
      else { positions[drag.nodeId] = { x: drag.nx + dx, y: drag.ny + dy }; render(); }
    });
    window.addEventListener("pointerup", () => { drag = null; viewport.classList.remove("grabbing"); });

    nodesEl.addEventListener("input", e => {
      const id = e.target.dataset.label || e.target.dataset.notesText;
      if (!id) return;
      const n = nodes.find(x => x.id === id);
      if (e.target.dataset.label) n.label = e.target.value;
      else n.notes = e.target.value;
    });
    nodesEl.addEventListener("change", e => {
      if (e.target.dataset.check) nodes.find(x => x.id === e.target.dataset.check).checked = e.target.checked;
      render();
    });
    nodesEl.addEventListener("click", e => {
      const t = e.target;
      if (t.dataset.pri) { nodes.find(x => x.id === t.dataset.pri).priority = +t.dataset.level; render(); }
      if (t.dataset.notes) { const n = nodes.find(x => x.id === t.dataset.notes); n.notesOpen = !n.notesOpen; render(); }
      if (t.dataset.del) {
        const id = t.dataset.del;
        nodes = nodes.filter(n => n.id !== id && n.parentId !== id);
        delete positions[id];
        render();
      }
    });
    nodesEl.addEventListener("paste", e => {
      const box = e.target.closest("[data-paste]");
      if (!box) return;
      const id = box.dataset.paste;
      for (const item of e.clipboardData.items) {
        if (item.type.startsWith("image/")) {
          e.preventDefault();
          const r = new FileReader();
          r.onload = () => { nodes.find(x => x.id === id).images.push(r.result); render(); };
          r.readAsDataURL(item.getAsFile());
        }
      }
    });

    document.getElementById("addCat").onclick = () => {
      const id = uid();
      nodes.push({ id, parentId: null, label: "New category", checked: false, priority: 3, notes: "", images: [], notesOpen: false, isCategory: true });
      positions[id] = { x: CX, y: CY };
      render();
    };
    document.getElementById("addTask").onclick = () => {
      const cat = category();
      const id = uid();
      const cp = positions[cat.id];
      const n = nodes.filter(x => x.parentId === cat.id).length;
      const a = (Math.PI * 2 * n) / (n + 1) - Math.PI / 2;
      positions[id] = { x: cp.x + Math.cos(a) * 260, y: cp.y + Math.sin(a) * 260 };
      nodes.push({ id, parentId: cat.id, label: "New task", checked: false, priority: 2, notes: "", images: [], notesOpen: false, isCategory: false });
      render();
    };
    document.getElementById("resetView").onclick = () => { pan = { x: -1560, y: -1640 }; applyTransform(); };

    render();
  </script>
</body>
</html>
